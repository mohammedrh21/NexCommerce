<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexCommerce | Smart Multi-Vendor Marketplace</title>
    <base href="/" />
    
    <!-- SEO & OpenGraph Meta Tags -->
    <meta name="description" content="NexCommerce - The premium smart multi-vendor e-commerce platform built with Blazor and .NET 10." />
    <meta property="og:title" content="NexCommerce | Smart Multi-Vendor Marketplace" />
    <meta property="og:description" content="Sleek, secure, and fast shopping experience for customers and tools for vendors." />
    <meta property="og:type" content="website" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/app.css" />
    <link href="Styles/app.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    
    <!-- Stripe.js for payment integration -->
    <script src="https://js.stripe.com/v3/" defer></script>
</head>

<body class="bg-slate-50 text-slate-900 font-sans antialiased selection:bg-brand-500/10 dark:bg-slate-950 dark:text-slate-100">
    <div id="app">
        <!-- Premium modern spinner shown during Blazor startup -->
        <div class="flex flex-col items-center justify-center min-h-screen bg-slate-50 dark:bg-slate-950">
            <div class="relative flex items-center justify-center">
                <div class="w-16 h-16 border-4 border-violet-100 border-t-violet-600 rounded-full animate-spin"></div>
                <div class="absolute text-violet-600 font-semibold text-xs tracking-wider uppercase">NEX</div>
            </div>
            <p class="mt-4 text-sm font-medium text-slate-500 dark:text-slate-400 animate-pulse">Loading NexCommerce...</p>
        </div>
    </div>

    <div id="blazor-error-ui" class="hidden fixed bottom-4 right-4 z-50 p-4 bg-red-50 text-red-900 dark:bg-red-950 dark:text-red-100 rounded-lg shadow-lg border border-red-200 dark:border-red-900">
        <div class="flex items-center space-x-2">
            <svg class="w-5 h-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span class="text-sm font-medium">An unexpected error has occurred.</span>
            <a href="." class="reload px-2 py-1 bg-red-600 text-white rounded text-xs font-semibold hover:bg-brand-700 transition-colors">Reload</a>
            <span class="dismiss cursor-pointer px-2 py-1 text-slate-400 hover:text-slate-600 text-xs font-bold">✕</span>
        </div>
    </div>

    <!-- Application Script interop helpers -->
    <script src="js/app.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
</body>

</html>
